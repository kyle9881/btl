<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Token Locker</title>
</head>
<body style="font-family:sans-serif; padding:20px;">

<h2>🔒 Token Locker</h2>

<button onclick="alert('按鈕正常');connect()">連接錢包</button>
<p id="addr"></p>

<hr>

<p>代幣地址：</p>
<input id="token" style="width:100%">

<p>數量（例如 5）：</p>
<input id="amount">

<p>解鎖日期：</p>
<input
  type="datetime-local"
  id="unlockDate"
  style="font-size:16px;padding:8px;width:220px;"
>
<br><br>

<p>📱 手機版日期（如果上面不能選）</p>

<input
  type="text"
  id="mobileDate"
  placeholder="2026-06-01 12:00"
  style="font-size:16px;padding:8px;width:220px;"
>
<br><br>
<button onclick="approveAndLock()">一鍵鎖幣</button>
<br><br>

<label>Lock ID：</label><br>
<input type="number" id="claimId" placeholder="例如 0">
<br><br>

<button onclick="claimToken()">
到期解鎖提領
</button>
<br><br>

<button
onclick="checkLock()"
style="
width:100%;
padding:14px;
background:#16a34a;
color:white;
border:none;
border-radius:10px;
font-size:16px;
"
>
📋 查詢鎖倉 / Check Lock
</button>
<br><br>

<div id="msg"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

<script>
let provider, signer;

const locker = "0x2952647820691397f0E716081eF74141ACf3645D";

const erc20ABI = [
  "function approve(address spender,uint256 amount)",
  "function decimals() view returns (uint8)"
];

const lockerABI = [
  "function lock(address,uint256,uint256)"
];

async function connect() {

  alert("connect開始");

  if (typeof window.ethereum === 'undefined') {
    alert("沒有偵測到MetaMask");
    return;
  }

  try {

    provider = new ethers.providers.Web3Provider(window.ethereum);

    alert("provider成功");

    await provider.send("eth_requestAccounts", []);

    signer = provider.getSigner();

    const addr = await signer.getAddress();

    document.getElementById("addr").innerHTML =
      "已連接：" + addr;

    alert("連接成功");

  } catch (err) {

    console.error(err);

    alert("錯誤：" + err.message);

  }
}
async function approveAndLock() {
  try {
    const tokenAddr = document.getElementById("token").value;
    const amountInput = document.getElementById("amount").value;
    let dateInput =
document.getElementById("unlockDate").value;

const mobileDate =
document.getElementById("mobileDate").value;

// 如果 datetime-local 沒填
// 就使用手機輸入框

if (!dateInput && mobileDate) {
  dateInput = mobileDate.replace(" ", "T");
}

if (!tokenAddr || !amountInput || !dateInput) {
  alert("請填完整");
  return;
}
    const token = new ethers.Contract(tokenAddr, erc20ABI, signer);
    const lockerContract = new ethers.Contract(locker, lockerABI, signer);

    // ① 讀 decimals
    const decimals = await token.decimals();

    // ② 轉數量
    const amount = ethers.utils.parseUnits(amountInput, decimals);

    // ③ 日期轉時間戳
    const unlockTime = Math.floor(new Date(dateInput).getTime() / 1000);

    // ④ approve
    alert("步驟1：請確認 approve");
    const tx1 = await token.approve(locker, amount);
    await tx1.wait();

    // ⑤ lock
    alert("步驟2：請確認 lock");
    const tx2 = await lockerContract.lock(tokenAddr, amount, unlockTime);
    await tx2.wait();

    alert("✅ 完成鎖幣！");
  } catch (e) {
    console.error(e);
    alert("錯誤：" + e.message);
  }
}
async function claimToken() {

  try {

    const id = document.getElementById("claimId").value;

    if (!id) {
      alert("請輸入 Lock ID");
      return;
    }

    const contract = new ethers.Contract(
  locker,
  [
    "function claim(uint256)"
  ],
  signer
);

    document.getElementById("msg").innerHTML =
      "⏳ 解鎖中...";

    const tx = await contract.claim(id);

    await tx.wait();

    document.getElementById("msg").innerHTML =
      "✅ 解鎖成功";

    alert("代幣已提領回錢包");

  } catch(err) {

    console.error(err);

    alert("解鎖失敗：" + err.message);

  }
}
async function checkLock(){

try{

    const id =
    document.getElementById("claimId").value;

    if(id === ""){

        alert("請輸入 Lock ID");

        return;
    }

    const contract =
    new ethers.Contract(

        locker,

        [

        "function locks(uint256) view returns(address token,address owner,uint256 amount,uint256 unlockTime,bool claimed)"

        ],

        provider

    );

    const data =
    await contract.locks(id);

    const unlockDate =
    new Date(
        data.unlockTime.toNumber() * 1000
    );

    const now =
    Date.now();

    const diff =
    unlockDate - now;

    const days =
    Math.floor(diff / 86400000);

    alert(

        "Token:\\n" +

        data.token +

        "\\n\\nOwner:\\n" +

        data.owner +

        "\\n\\nAmount:\\n" +

        data.amount +

        "\\n\\nUnlock Time:\\n" +

        unlockDate +

        "\\n\\n剩餘天數:\\n" +

        days +

        "\\n\\nClaimed:\\n" +

        data.claimed

    );

}catch(err){

    console.error(err);

    alert(err.message);

}

}
</script>

</body>
</html>
